name: Blabla
options:
  bundleIdPrefix: com.blabla
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

targets:
  Blabla:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Blabla
        excludes:
          - Resources/Info.plist
          - Resources/Blabla.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blabla.app
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Sources/Blabla/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Blabla/Resources/Blabla.entitlements
    dependencies:
      - sdk: ScreenCaptureKit.framework
