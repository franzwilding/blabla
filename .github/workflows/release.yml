name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build & Release
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Blabla.xcodeproj \
            -scheme Blabla \
            -configuration Release \
            -archivePath build/Blabla.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package app
        run: |
          cp -R build/Blabla.xcarchive/Products/Applications/Blabla.app Blabla.app
          zip -r Blabla.zip Blabla.app

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: Blabla.zip
          generate_release_notes: true
